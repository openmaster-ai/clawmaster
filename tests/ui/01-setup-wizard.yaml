suite: setup-wizard
name: 安装向导 Demo 全流程
description: |
  验证安装向导在 demo 模式下的完整状态流转：
  检测中 → 就绪（显示缺失能力）→ 安装中（进度条）→ 完成 → 进入主界面

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 使用 ?demo=install 参数触发 demo 模式

viewport: { width: 1280, height: 800 }

cases:
  - id: setup-01
    name: 检测中状态渲染
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: setup-detecting
    assertions:
      - 页面显示"龙虾管理大师"标题
      - 页面显示"OpenClaw 生态的六边形战士"副标题
      - 页面显示"Demo 模式"标签
      - 页面显示"正在检测系统能力..."
      - 能力列表开始出现（核心引擎、记忆管理等），部分状态为"检测中..."

  - id: setup-02
    name: 检测完成 → 就绪状态
    steps:
      - action: wait
        duration: 4000ms
        reason: demo adapter 每项检测有 400-700ms 延迟，5 项约需 3-4 秒
      - action: screenshot
        name: setup-ready
    assertions:
      - 5 项能力全部显示最终状态
      - 核心引擎显示"v2026.3.13"（已安装）
      - 记忆管理显示"v0.2.0"（已安装）
      - 可观测性显示"未安装"（橙色）
      - 文档与图像识别显示"未安装"（橙色）
      - 智能体编排显示"v0.1.4"（已安装）
      - 核心引擎（required=true）已安装 → 不需要安装按钮
      - 页面显示"核心引擎已就绪，2 项扩展能力可稍后安装"
      - '“进入管理大师”按钮可见且可点击（因为 required 全部满足）'
      - 显示"未安装的能力可在对应功能页面按需安装"提示

  - id: setup-03
    name: 直接进入主界面（required 已满足时跳过安装）
    steps:
      - action: click
        target: text("进入管理大师")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: setup-enter-direct
    assertions:
      - 安装向导消失
      - 主界面 Layout 渲染（侧边栏 + 内容区）
      - 侧边栏显示"龙虾管理大师"logo + "ClawMaster"文字
      - 侧边栏包含至少 10 个导航项（含可观测、记忆）
      - 可观测/记忆虽未安装，但导航项仍显示（进入后按需安装）

  - id: setup-04
    name: 可观测页面显示能力引导安装
    steps:
      - action: click
        target: role(link, "可观测")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: setup-observe-guard
    assertions:
      - 页面显示"可观测性尚未启用"
      - 显示"安装可观测性"按钮
      - 显示"重新检测"按钮
      - 不显示费用卡片/图表（被 guard 拦截）

  - id: setup-05
    name: 记忆页面显示原生记忆工作区
    steps:
      - action: click
        target: role(link, "记忆")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: setup-memory-native
    assertions:
      - 页面显示"记忆管理"
      - 显示原生记忆概览卡片
      - 显示存储文件列表
      - 不显示安装引导

  # === Issue #4 修复验证 ===

  - id: setup-06
    name: 检测使用 useEffect 触发（非 useState 副作用）
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: setup-useeffect
    assertions:
      - 安装向导正常渲染并开始检测
      - 检测通过 useEffect 触发（非 useState 初始化器）
      - StrictMode 下不会导致 startDetection 被重复调用

  - id: setup-07
    name: 完成页控制台链接使用动态 URL
    preconditions:
      - 完成安装流程到达结果页
    steps:
      - action: observe
        target: 控制台链接
    assertions:
      - 控制台链接 href 由 buildGatewayUrl 生成
      - 链接使用配置中的网关端口（非硬编码 127.0.0.1）
