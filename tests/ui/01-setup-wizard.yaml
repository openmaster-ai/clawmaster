suite: setup-wizard
name: 安装向导 Demo 全流程（简化版）
description: |
  验证简化后的安装向导在 demo 模式下的完整状态流转：
  Step 1: 检测 OpenClaw Engine → 安装（如需要）→ 初始化配置
  Step 2: 选择 LLM 提供商 → 输入 API Key → 选择模型
  完成: 圆形揭幕动画 → 进入主界面

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 使用 ?demo=install 参数触发 demo 模式

viewport: { width: 1280, height: 800 }

cases:
  - id: wizard-01
    name: Step 1 — 检测中状态渲染
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 500ms
      - action: screenshot
        name: wizard-detecting
    assertions:
      - 页面显示"ClawMaster"标题
      - 页面显示品牌标语
      - 页面显示语言切换器（中/英/日）
      - 品牌图标外圈有旋转动画（wizard-brand-ring-spin）
      - 状态卡片显示"OpenClaw Engine"
      - 状态卡片显示"正在检测系统能力..."
      - 无安装按钮（正在检测中）

  - id: wizard-02
    name: Step 1 — 检测完成，引擎已安装，自动跳转
    steps:
      - action: wait
        duration: 4000ms
        reason: demo adapter 每项检测有 400-700ms 延迟
      - action: screenshot
        name: wizard-provider-step
    assertions:
      - 自动跳过安装，进入 Step 2
      - 页面显示"配置 LLM 提供商"
      - 步骤指示器显示 OpenClaw（已完成 ✓）+ 模型（当前）
      - 金牌赞助商区域显示"文心大模型"
      - 推荐提供商区域显示 OpenAI / Anthropic / DeepSeek / Google / Ollama 等
      - 显示 API Key 输入框
      - 显示"跳过剩余步骤"链接

  - id: wizard-03
    name: Step 1 — 引擎未安装时显示安装界面
    preconditions:
      - 需要模拟引擎未安装的场景（或使用未安装 OpenClaw 的环境）
    steps:
      - action: observe
        target: wizard-engine-step
    assertions:
      - 状态卡片显示"核心引擎未安装"（橙色图标）
      - 显示"使用国内 npm 镜像"复选框
      - 显示"安装核心引擎"主按钮

  - id: wizard-04
    name: Step 1 — 安装进度条动画
    preconditions:
      - 点击了"安装核心引擎"按钮
    steps:
      - action: click
        target: text("安装核心引擎")
      - action: wait
        duration: 1000ms
      - action: screenshot
        name: wizard-installing
    assertions:
      - 品牌图标外圈显示 conic-gradient 进度环
      - 状态卡片显示进度条（wizard-progress-bar）
      - 进度条有发光效果（box-shadow）
      - 状态文字显示当前安装阶段（解析依赖/下载/安装/链接）
      - 安装按钮消失，无法重复点击

  - id: wizard-05
    name: Step 2 — 选择提供商并输入 API Key
    steps:
      - action: click
        target: text("OpenAI")
      - action: screenshot
        name: wizard-openai-selected
    assertions:
      - OpenAI 按钮高亮（wizard-provider-chip-active）
      - 显示"获取 OpenAI API Key →"链接
      - API Key 输入框 placeholder 显示"输入 OpenAI API Key"
      - 显示"验证并继续"按钮（禁用状态，因为未输入）

  - id: wizard-06
    name: Step 2 — API Key 验证成功后展示模型选择
    steps:
      - action: input
        target: placeholder("输入 OpenAI API Key")
        value: "sk-test-key"
      - action: click
        target: text("验证并继续")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: wizard-model-picker
    assertions:
      - 模型选择卡片以 slide-up 动画出现（wizard-card-appear）
      - 显示"选择默认模型"标题
      - 显示 GPT-4.1 / GPT-4.1 Mini / GPT-4o 等单选按钮
      - GPT-4.1 Mini 默认选中
      - 显示自定义模型 ID 输入框
      - 显示"进入管理大师"按钮

  - id: wizard-07
    name: Step 2 — 自定义模型 ID
    steps:
      - action: input
        target: placeholder("输入模型 ID")
        value: "gpt-5-preview"
      - action: screenshot
        name: wizard-custom-model
    assertions:
      - 自定义输入有值后，所有单选按钮取消选中
      - "进入管理大师"按钮可点击

  - id: wizard-08
    name: 完成 — 圆形揭幕动画进入主界面
    steps:
      - action: click
        target: text("进入管理大师")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: wizard-circle-reveal
      - action: wait
        duration: 1000ms
      - action: screenshot
        name: wizard-main-app
    assertions:
      - 出现全屏圆形揭幕遮罩（CircleReveal）
      - clip-path 从 circle(0%) 扩展到 circle(150%)
      - 动画持续约 700ms
      - 动画完成后主界面 Layout 渲染
      - 安装向导完全消失

  - id: wizard-09
    name: 跳过流程
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
      - action: click
        target: text("跳过剩余步骤")
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: wizard-skip
    assertions:
      - 圆形揭幕动画触发
      - 直接进入主界面
      - 不调用 testApiKey / setApiKey / setDefaultModel

  - id: wizard-10
    name: npm 镜像开关
    preconditions:
      - 引擎未安装场景
    steps:
      - action: click
        target: checkbox("使用国内 npm 镜像")
      - action: screenshot
        name: wizard-mirror-checked
    assertions:
      - 复选框勾选
      - 点击安装后，npm install 命令附加 --registry https://registry.npmmirror.com

  - id: wizard-11
    name: 国际化切换
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
      - action: select
        target: language-switcher
        value: "ja"
      - action: screenshot
        name: wizard-japanese
    assertions:
      - 页面显示日文文案"LLMプロバイダーを設定"
      - 提供商名称保持原文（OpenAI / Anthropic 等）
