suite: skills-marketplace
name: 技能市场
description: |
  验证当前技能页的主流程：
  ClawHub 前置检查、重点推荐技能、已安装技能筛选、SkillGuard 扫描，以及运行时启用/禁用效果。

preconditions:
  - dev server 已启动
  - 已进入主界面

viewport: { width: 1280, height: 800 }

cases:
  - id: skill-01
    name: 页面头部与指标卡
    steps:
      - action: navigate
        url: "{BASE_URL}/skills"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: skill-page-header
    assertions:
      - 页面标题显示"技能市场"
      - 副标题说明先从 ClawHub 安装，再只启用应暴露给运行时的技能
      - 顶部显示 4 张指标卡：已安装技能、当前启用、可立即使用、重点推荐
      - 页面不显示 emoji

  - id: skill-02
    name: 重点推荐技能区块
    steps:
      - action: observe
        target: 重点推荐技能区块
      - action: screenshot
        name: skill-featured
    assertions:
      - 显示"先从 4 个高价值技能开始"
      - 显示 4 张重点推荐技能卡
      - 技能标题使用技能 ID 或 skill key，不显示冗余 slug 副标题
      - 默认排序为 clawvet、find-skills、openclaw-memory-pro-system、self-improving-agent
      - 每张卡片包含分类标签、简短描述、安装或启用按钮、源码按钮

  - id: skill-03
    name: 分类 pill 过滤
    steps:
      - action: click
        target: text("智能体")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: skill-filter-agent
    assertions:
      - 分类 pill 包含：全部、OCR 文档、写作风格、编程工程、效率工具、智能体
      - 当前分类 pill 高亮
      - 已安装技能列表根据分类过滤
      - 点击"全部"后恢复完整列表

  - id: skill-04
    name: 推荐技能卡操作入口
    steps:
      - action: observe
        target: 某重点推荐技能卡
    assertions:
      - 未安装时显示"安装"主按钮
      - 已安装时显示启用或禁用按钮
      - 卡片同时提供"源码"外链
      - 源码按钮带 ExternalLink 图标并以新窗口打开

  - id: skill-05
    name: 运行时冲突提示
    preconditions:
      - 已安装技能中存在与重点推荐 skill key 相同、但来源不同的技能
    steps:
      - action: observe
        target: 发生冲突的重点推荐技能卡
      - action: screenshot
        name: skill-collision
    assertions:
      - 卡片显示运行时冲突提示
      - 提示文案说明已有其他来源的同名技能正在占用该 key
      - 不会把个人技能误判成重点推荐技能已正确安装

  - id: skill-06
    name: 已安装技能区块与空状态
    steps:
      - action: scroll_to
        target: text("当前工作区已安装")
      - action: screenshot
        name: skill-installed
    assertions:
      - 显示"当前工作区已安装"区块
      - 区块右侧显示过滤输入框
      - 如有技能：按卡片方式展示技能 ID、版本、描述、状态标签与操作按钮
      - 如无技能：显示空状态"暂无已安装技能"

  - id: skill-07
    name: 已安装技能过滤
    preconditions:
      - 已安装至少 2 个技能
    steps:
      - action: fill
        target: input[placeholder*="过滤已安装技能"]
        value: "find"
      - action: wait
        duration: 500ms
      - action: screenshot
        name: skill-installed-filter
    assertions:
      - 列表只保留名称、ID、描述或来源匹配关键字的技能
      - 如无匹配则显示"无匹配结果"
      - 清空输入框后恢复完整列表

  - id: skill-08
    name: ClawHub CLI 缺失时先显示安装引导
    preconditions:
      - 当前机器未安装 ClawHub CLI
    steps:
      - action: navigate
        url: "{BASE_URL}/skills"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: skill-clawhub-prerequisite
    assertions:
      - 页面显示"先安装 ClawHub CLI"
      - 显示安装命令提示
      - 显示"安装 ClawHub CLI"主按钮
      - 重点推荐技能卡的安装入口变为"先安装 ClawHub"

  - id: skill-09
    name: ClawHub CLI 安装进度反馈
    preconditions:
      - 当前机器未安装 ClawHub CLI
    steps:
      - action: click
        target: text("安装 ClawHub CLI")
      - action: observe
        duration: 10000ms
      - action: screenshot
        name: skill-clawhub-install
    assertions:
      - 安装卡进入进行中状态
      - 页面显示步骤化进度组件，而非静默等待
      - 安装成功后状态切换为已就绪
      - 失败时显示错误信息与重试入口

  - id: skill-10
    name: SkillGuard 扫描结果与详情弹层
    preconditions:
      - 至少一个已安装技能支持扫描
    steps:
      - action: click
        target: 某已安装技能的"扫描"按钮
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: skill-scan-summary
    assertions:
      - 扫描期间显示"扫描中..."
      - 完成后在技能卡下方显示 SkillGuard 摘要
      - 摘要卡显示安全等级、问题数、最高严重度等紧凑信息
      - 显示"查看详情"按钮
      - 点击后打开详情弹层
      - 详情弹层覆盖技能页主要视口，包含技能路径、扫描时间、严重度分布与主要发现

  - id: skill-11
    name: 已安装技能启用或禁用
    preconditions:
      - 至少存在一个已安装技能
    steps:
      - action: click
        target: 某技能卡的"启用"或"禁用"按钮
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: skill-runtime-toggle
    assertions:
      - 按钮在处理中显示启用中或禁用中
      - 技能状态标签即时更新
      - 状态会写回 OpenClaw 的 skills.entries.<skillKey>.enabled 配置

  - id: skill-12
    name: 已安装列表慢加载时仍保留推荐区
    preconditions:
      - 已安装技能列表请求存在可感知延迟
    steps:
      - action: navigate
        url: "{BASE_URL}/skills"
      - action: wait
        duration: 300ms
      - action: screenshot
        name: skill-loading-partial
    assertions:
      - 重点推荐技能区先渲染
      - 已安装技能区显示 loading 状态
      - 页面不显示已废弃的精选目录或 OpenClaw 运行时状态面板

  - id: skill-13
    name: 重点技能在 OpenClaw WebUI 中生效
    preconditions:
      - 已通过管理页安装并启用 find-skills 等重点技能
      - OpenClaw WebUI 已启动且读取同一 profile
    steps:
      - action: observe
        target: OpenClaw WebUI 对话输入区
      - action: screenshot
        name: skill-openclaw-runtime
    assertions:
      - 新开会话后，OpenClaw WebUI 能识别已启用技能
      - 可通过让助手列出可用技能或直接触发对应能力来验证
      - 禁用后重新发起新会话，对应技能不再被暴露
