suite: onboarding-config
name: 安装后配置引导全流程（简化版）
description: |
  验证简化后的 Setup Wizard 配置引导步骤：
  Step 1: 检测/安装 OpenClaw Engine → 自动初始化配置
  Step 2: 选择 LLM 提供商 → 验证 API Key → 选择模型 → 圆形揭幕进入主界面
  网关/通道/模块启用已从向导中移除，用户可在主界面各功能页按需配置。

preconditions:
  - npm run dev:web 已启动
  - openclaw 已安装（或使用 ?demo=install 模拟）

viewport: { width: 1280, height: 800 }

# ──────────────────────────────────────────────
# Part A: Demo 模式下配置引导 UI 全流程
# ──────────────────────────────────────────────

cases:
  - id: onboard-01
    name: 引擎已安装时自动跳到提供商配置
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
        reason: 等待 demo 检测完成 + initConfig 自动执行
      - action: screenshot
        name: onboard-auto-provider
    assertions:
      - 页面显示"配置 LLM 提供商"标题
      - 步骤指示器显示 OpenClaw（✓ 已完成）+ 模型（当前）
      - 显示金牌赞助商区域（文心大模型）
      - 显示推荐提供商区域（OpenAI/Anthropic/DeepSeek 等）
      - 默认选中"文心大模型"

  - id: onboard-02
    name: 选择 OpenAI 并输入 API Key
    steps:
      - action: click
        target: text("OpenAI")
      - action: screenshot
        name: onboard-openai-selected
    assertions:
      - OpenAI 按钮高亮
      - 显示"获取 OpenAI API Key →"链接（指向 platform.openai.com）
      - API Key 输入框 placeholder 显示"Enter OpenAI API Key"
      - "验证并继续"按钮 disabled（Key 为空）

  - id: onboard-03
    name: 验证 API Key 并展示模型选择
    steps:
      - action: fill
        target: input[type="password"]
        value: "sk-demo-test-key"
      - action: click
        target: text("验证并继续")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: onboard-model-picker
    assertions:
      - 模型选择卡片以上滑动画出现
      - 显示"选择默认模型"标题
      - 显示 GPT-4.1 / GPT-4.1 Mini / GPT-4o 等单选项
      - GPT-4.1 Mini 默认选中
      - 显示自定义模型 ID 输入框
      - 显示"进入管理大师"按钮

  - id: onboard-04
    name: 选择模型后圆形揭幕进入主界面
    steps:
      - action: click
        target: text("进入管理大师")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: onboard-circle-reveal
      - action: wait
        duration: 1000ms
      - action: screenshot
        name: onboard-main-app
    assertions:
      - 出现全屏圆形揭幕遮罩（clip-path circle 动画）
      - 动画完成后主界面 Layout 渲染
      - 安装向导完全消失

  - id: onboard-05
    name: 跳过配置直接进入主界面
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
      - action: click
        target: text("跳过剩余步骤")
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: onboard-skip-to-dashboard
    assertions:
      - 圆形揭幕动画触发
      - 主界面 Layout 渲染
      - 未调用 testApiKey / setApiKey / setDefaultModel

  - id: onboard-06
    name: 切换提供商重置 API Key 和模型状态
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
      - action: click
        target: text("OpenAI")
      - action: fill
        target: input[type="password"]
        value: "sk-test"
      - action: click
        target: text("验证并继续")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: onboard-model-shown
      - action: click
        target: text("Anthropic")
      - action: screenshot
        name: onboard-provider-switched
    assertions:
      - 模型选择卡片消失（切换提供商后重置验证状态）
      - API Key 输入框清空
      - Anthropic 按钮高亮，OpenAI 恢复普通状态

# ──────────────────────────────────────────────
# Part B: 国际化
# ──────────────────────────────────────────────

  - id: onboard-07
    name: 中文界面
    steps:
      - action: navigate
        url: "{BASE_URL}?demo=install"
      - action: wait
        duration: 5000ms
      - action: select
        target: language-switcher
        value: "zh"
      - action: screenshot
        name: onboard-chinese
    assertions:
      - 显示"配置 LLM 提供商"
      - 显示"文心大模型"
      - 显示"验证并继续"按钮
      - 显示"跳过剩余步骤"链接

  - id: onboard-08
    name: npm 镜像开关（引擎未安装时）
    preconditions:
      - 需要模拟引擎未安装场景
    steps:
      - action: observe
        target: wizard-engine-step
    assertions:
      - 显示"使用国内 npm 镜像 (npmmirror.com) 加速下载"复选框
      - 默认未勾选
      - 勾选后安装时 npm install 附加 --registry https://registry.npmmirror.com

# ──────────────────────────────────────────────
# Part C: 真实 CLI 模式
# ──────────────────────────────────────────────

  - id: onboard-09
    name: 真实模式：引擎已安装，直接进入提供商配置
    preconditions:
      - 不使用 ?demo 参数
      - openclaw 已安装
    steps:
      - action: navigate
        url: "{BASE_URL}"
      - action: wait
        duration: 5000ms
      - action: screenshot
        name: onboard-real-provider
    assertions:
      - 自动检测到 OpenClaw → 初始化配置 → 进入提供商配置
      - 显示"配置 LLM 提供商"

  - id: onboard-10
    name: 真实模式：跳过进入主界面
    steps:
      - action: click
        target: text("跳过剩余步骤")
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: onboard-real-skip
    assertions:
      - 圆形揭幕动画
      - 进入主界面 Dashboard
