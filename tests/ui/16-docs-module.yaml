suite: docs-module
name: 文档中心功能
description: |
  验证文档中心页面的核心体验：
  本地优先搜索、场景入口、可复制命令、实时文档回退

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 已进入主界面

viewport: { width: 1280, height: 800 }

cases:
  - id: doc-01
    name: 文档首页结构与本地优先说明
    steps:
      - action: navigate
        url: "{BASE_URL}/docs"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: docs-home
    assertions:
      - 页面标题"文档"
      - 页面副标题说明本地优先帮助索引
      - 顶部显示 3 个标识："本地索引""任务剧本""CLI 回退"
      - Hero 区显示搜索输入框和"搜索实时文档"按钮
      - Hero 右侧显示 3 条工作方式说明："本地优先""任务回到页面""上游回退"
      - 页面默认显示 4 个主分区："常见任务""核心指南""可复制命令""排障入口"

  - id: doc-02
    name: 本地搜索先过滤内置内容
    steps:
      - action: navigate
        url: "{BASE_URL}/docs"
      - action: wait
        duration: 1000ms
      - action: fill
        target: input[placeholder*="搜索"]
        value: "gateway"
      - action: wait
        duration: 500ms
      - action: screenshot
        name: docs-local-search
    assertions:
      - 显示"本地匹配结果"标题
      - 显示结果数量说明
      - 本地结果内至少出现 1 张与 Gateway 相关的卡片
      - 默认的完整 4 个主分区不再同时展示
      - 搜索实时文档按钮保持可点击

  - id: doc-03
    name: 无本地结果时保留回退入口
    steps:
      - action: navigate
        url: "{BASE_URL}/docs"
      - action: wait
        duration: 1000ms
      - action: fill
        target: input[placeholder*="搜索"]
        value: "totally-unmatched-keyword"
      - action: wait
        duration: 500ms
      - action: screenshot
        name: docs-no-local-match
    assertions:
      - 显示"暂时没有本地匹配"
      - 显示建议改关键词或直接使用实时文档搜索
      - '“搜索实时文档”按钮仍可用'

  - id: doc-04
    name: 可复制命令与页面回链
    steps:
      - action: navigate
        url: "{BASE_URL}/docs"
      - action: wait
        duration: 1200ms
      - action: scroll_to
        target: 可复制命令区域
      - action: click
        target: text("复制命令")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: docs-command-copy
    assertions:
      - 可复制命令区域至少显示 4 张命令卡片
      - 每张命令卡片显示标题、说明和 monospace 命令块
      - 点击后显示"命令已复制"反馈
      - 命令卡片带有"打开页面"或"打开指南"入口

  - id: doc-05
    name: 实时文档回退结果区域
    steps:
      - action: navigate
        url: "{BASE_URL}/docs"
      - action: wait
        duration: 1000ms
      - action: fill
        target: input[placeholder*="搜索"]
        value: "gateway auth"
      - action: click
        target: text("搜索实时文档")
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: docs-live-search
    assertions:
      - 点击后按钮在请求期间显示搜索中状态
      - 请求完成后出现"实时文档结果"区域或错误提示
      - 如有结果：每条结果显示标题、URL、摘要，且链接在新标签页打开
      - 如无结构化结果：显示"实时文档搜索未返回结构化结果。"
