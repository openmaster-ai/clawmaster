name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-description:
    name: Check PR description
    runs-on: ubuntu-latest
    steps:
      - name: Validate required sections
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            // Normalize CRLF → LF so regexes don't break on Windows-style line endings
            const body = (pr.body ?? '').replace(/\r\n/g, '\n');

            // Split the body into sections on Markdown headings (## or ###).
            // Each section starts with the heading text on its own line.
            const sections = body.split(/^#{2,}\s+/m).slice(1);
            const whatSection = sections.find((s) => /^what\b/i.test(s.trim()));
            const whatContent = whatSection
              ? whatSection.replace(/^what[^\n]*\n/i, '').replace(/<!--[\s\S]*?-->/g, '').trim()
              : '';

            if (whatContent.length < 20) {
              core.setFailed(
                'PR description is missing a What section with enough detail.\n' +
                'Please fill in ## What with at least one sentence (20+ chars) describing what changed.'
              );
              return;
            }

            // Warn if the caution reminder line was not removed (means checklist was not read)
            if (body.includes('does not **commit** screenshots')) {
              core.warning(
                'The PR template reminder line under [!CAUTION] is still present. ' +
                'Please confirm and delete it before requesting review.'
              );
            }

            core.info(`## What section detected: ${whatContent.length} chars`);

            // Nudge: if the PR touches UI modules and the body has no embedded images,
            // suggest adding screenshots. Warning only — never blocks merge.
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const touchesUi = files.some((f) =>
              /^packages\/web\/src\/modules\/.+\.tsx$/.test(f.filename)
            );
            const bodyWithoutComments = body.replace(/<!--[\s\S]*?-->/g, '');
            const hasImage =
              /!\[[^\]]*\]\([^)]+\)/.test(bodyWithoutComments) ||
              /<img\b[^>]*>/i.test(bodyWithoutComments) ||
              /https:\/\/(user-images\.githubusercontent\.com|github\.com\/[^\/]+\/[^\/]+\/assets)\//.test(
                bodyWithoutComments
              );
            if (touchesUi && !hasImage) {
              core.warning(
                'This PR touches UI modules (packages/web/src/modules/**.tsx) but the ' +
                'description has no embedded screenshots. Consider adding one under ' +
                '## Screenshots — drag-drop into the GitHub editor, or paste markdown ' +
                'from an image host.'
              );
            }

            core.info('PR description check passed.');
