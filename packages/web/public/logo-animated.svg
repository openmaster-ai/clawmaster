<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <style>
      :root {
        color: #F5A623;
      }

      .focal {
        animation: focal-breathe 2.8s ease-in-out infinite;
      }

      .arc-1 { animation: broadcast 2.8s ease-in-out infinite 0s; }
      .arc-2 { animation: broadcast 2.8s ease-in-out infinite 0.32s; }
      .arc-3 { animation: broadcast 2.8s ease-in-out infinite 0.64s; }
      .tips { animation: broadcast 2.8s ease-in-out infinite 0.82s; }

      @keyframes focal-breathe {
        0%, 100% { opacity: 1; }
        45%, 55% { opacity: 0.55; }
      }

      @keyframes broadcast {
        0% { opacity: 0.12; }
        12% { opacity: 1; }
        55% { opacity: 0.9; }
        100% { opacity: 0.12; }
      }

      @media (prefers-reduced-motion: reduce) {
        .focal,
        .arc-1,
        .arc-2,
        .arc-3,
        .tips {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </defs>

  <circle class="focal" cx="68" cy="50" r="5" fill="currentColor"/>

  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <path class="arc-1" d="M 68 40 A 10 10 0 0 0 68 60" stroke-width="3.5"/>
    <path class="arc-2" d="M 68 31 A 19 19 0 0 0 68 69" stroke-width="3"/>
    <path class="arc-3" d="M 68 22 A 28 28 0 0 0 68 78" stroke-width="2.5"/>
  </g>

  <g class="tips" fill="currentColor">
    <circle cx="68" cy="22" r="2.5"/>
    <circle cx="68" cy="78" r="2.5"/>
  </g>
</svg>
